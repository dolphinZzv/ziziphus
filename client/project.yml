name: IMApp
options:
  bundleIdPrefix: com.dolphinz
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"

settings:
  SWIFT_VERSION: "6.0"

schemes:
  IMApp:
    build:
      targets:
        IMApp: all
    test:
      targets:
        - IMAppUITests
  IMApp-iOS:
    build:
      targets:
        IMApp-iOS: all

packages:
  IMCore:
    path: Packages/IMCore
  Textual:
    path: ../deps/textual

targets:
  IMApp:
    type: application
    platform: macOS
    sources:
      - path: macos/Sources/IMApp
    dependencies:
      - package: IMCore
      - package: Textual
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: space.siciv.ziziphus.macos
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"
      GENERATE_INFOPLIST_FILE: YES

  IMApp-iOS:
    type: application
    platform: iOS
    sources:
      - path: ios/Sources/IMApp
      - path: ios/Resources
    dependencies:
      - package: IMCore
      - package: Textual
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: space.siciv.ziziphus.ios
      DEVELOPMENT_TEAM: ZNNCFNN477
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: Apple Development
      INFOPLIST_FILE: ios/Resources/Info.plist
      IPHONEOS_DEPLOYMENT_TARGET: "18.0"

  IMAppUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: macos/Tests/IMAppUITests
    dependencies:
      - target: IMApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dolphinz.imapp.uitests
      TEST_TARGET_NAME: IMApp
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"
      GENERATE_INFOPLIST_FILE: YES
