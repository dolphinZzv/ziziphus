name: IMApp
options:
  bundleIdPrefix: com.dolphinz
  deploymentTarget:
    macOS: "15.0"

settings:
  SWIFT_VERSION: "6.0"

packages:
  IMCore:
    path: Packages/IMCore

targets:
  IMApp:
    type: application
    platform: macOS
    sources:
      - path: macos/Sources/IMApp
    dependencies:
      - package: IMCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dolphinz.imapp
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"

  IMAppUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: macos/Tests/IMAppUITests
    dependencies:
      - target: IMApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dolphinz.imapp.uitests
      TEST_TARGET_NAME: IMApp
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"
