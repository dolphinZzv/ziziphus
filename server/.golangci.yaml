version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - "net/http.ResponseWriter.Write"
        - "(*encoding/json.Encoder).Encode"
        - "ziziphus/internal/message.*Ingest.*"
        - "ziziphus/internal/storage/db.*Repo.*"
    staticcheck:
      checks: ["all"]
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
      - ".*_test\\.go$"
formatters:
  enable:
    - gofmt
