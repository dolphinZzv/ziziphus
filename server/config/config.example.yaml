# IM Server Configuration
# Copy this file to config.yaml and adjust for your environment.
#
# IMPORTANT: JWT secret can be overridden via JWT_SECRET env var.
#   Generate one:  openssl rand -base64 32

# Application identity (displayed in emails, page titles, TOTP, etc.)
app:
  name: "Ziziphus"          # Application name used in email subjects, page titles, TOTP issuer
  headline: "Connect. Communicate. Create."  # Tagline shown on login/register pages
  env: "development"        # Runtime environment: development, staging, production

server:
  port: 8080
  # allow_registration: true   # set to false to disable new account registration

postgres:
  dsn: "postgres://postgres@localhost:5432/imdb?sslmode=disable"
  max_conns: 20
  migrations: "internal/storage/db/migrations"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

jwt:
  # CHANGE THIS in production — generate a random 256-bit key.
  # Can also be set via JWT_SECRET environment variable (takes precedence).
  secret: "change-me-to-a-random-secret-at-least-32-chars"
  expire_hours: 1       # access token lifetime in hours
  refresh_expire_hours: 168  # refresh token lifetime in hours

snowflake:
  worker_id: 1
  start_time: "2025-01-01T00:00:00Z"

# Rate limiting — disable api_enabled during E2E tests to avoid false failures.
ratelimit:
  msg_per_sec: 30         # WebSocket message rate
  max_body_bytes: 10240   # max WebSocket message body
  burst_size: 50          # WebSocket burst allowance

  # HTTP API rate limiters (login, register, per-IP DDoS protection)
  api_enabled: true                      # set false to disable all HTTP rate limiters (E2E)
  login_attempts: 10                     # failed attempts before lockout
  login_window_min: 1                    # window for counting attempts
  login_lockout_min: 5                   # lockout duration after too many failures
  reg_per_window: 5                      # registrations allowed per window
  reg_window_hour: 1                     # registration window (hours)
  global_rate: 100                       # req/s per IP (DDoS deterrent)
  global_burst: 200                      # burst size for global limiter

# OpenTelemetry distributed tracing (OTLP)
# Set enabled: true to export traces to a collector (e.g. Jaeger, SigNoz, Grafana Tempo).
# When disabled (default), tracing is a no-op with zero overhead.
otel:
  enabled: false                  # set to true to enable tracing
  endpoint: "localhost:4317"      # OTLP collector endpoint (gRPC)
  protocol: "grpc"                # "grpc" or "http" (only gRPC currently supported)
  service_name: "ziziphus"        # service name in traces
  sample_rate: 1.0                # trace sampling rate (0.0 - 1.0)
  insecure: true                  # disable TLS for the OTLP connection

# Zap structured logger with optional file rotation (lumberjack)
log:
  level: info           # debug, info, warn, error
  file: ""              # log file path, e.g. "./logs/app.log" (empty = stdout only; parent dir auto-created)
  max_size: 100         # megabytes before rotation
  max_age: 7            # days to retain old logs
  max_backups: 10       # number of old log files to retain
  compress: true        # compress rotated files

# Global announcement shown to all users
announcement:
  enabled: false
  title: ""
  body: ""
  url: ""

# SMTP for email sending (MFA verification codes, notifications)
smtp:
  host: ""           # e.g. "smtp.example.com"
  port: "587"        # default: 587
  user: ""           # SMTP user
  password: ""       # SMTP password
  from: ""           # From address, defaults to user if empty

# OAuth provider configuration (GitHub/Google login)
oauth:
  github:
    enabled: false
    client_id: ""
    client_secret: ""
    redirect_url: "http://localhost:8080/api/v1/auth/github/callback"
  google:
    enabled: false
    client_id: ""
    client_secret: ""
    redirect_url: "http://localhost:8080/api/v1/auth/google/callback"
