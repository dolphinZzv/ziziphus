# IM Server Configuration
# Copy this file to config.yaml and adjust for your environment.
#
# IMPORTANT: JWT secret can be overridden via JWT_SECRET env var.
#   Generate one:  openssl rand -base64 32
server:
  port: 8080
  # allow_registration: true   # set to false to disable new account registration

postgres:
  dsn: "postgres://postgres@localhost:5432/imdb?sslmode=disable"
  max_conns: 20
  migrations: "internal/storage/db/migrations"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

jwt:
  # CHANGE THIS in production — generate a random 256-bit key.
  # Can also be set via JWT_SECRET environment variable (takes precedence).
  secret: "change-me-to-a-random-secret-at-least-32-chars"
  expire_hours: 1       # access token lifetime in hours
  refresh_expire_hours: 168  # refresh token lifetime in hours

snowflake:
  worker_id: 1
  start_time: "2025-01-01T00:00:00Z"

ratelimit:
  msg_per_sec: 30
  max_body_bytes: 10240
  burst_size: 50

# Zap structured logger with optional file rotation (lumberjack)
log:
  level: info           # debug, info, warn, error
  file: ""              # log file path (empty = stdout only)
  max_size: 100         # megabytes before rotation
  max_age: 7            # days to retain old logs
  max_backups: 10       # number of old log files to retain
  compress: true        # compress rotated files

# Global announcement shown to all users
announcement:
  enabled: false
  title: ""
  body: ""
  url: ""

# SMTP for email sending (MFA verification codes, notifications)
smtp:
  host: ""           # e.g. "smtp.example.com"
  port: "587"        # default: 587
  user: ""           # SMTP user
  password: ""       # SMTP password
  from: ""           # From address, defaults to user if empty
