<div style="max-width:480px;margin:0 auto;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="font-size:14px;font-weight:600;color:#0F172A;margin-bottom:20px;">{{.AppName}}</div>
  <div style="padding:24px 0;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;">
    <div style="font-size:16px;font-weight:600;color:#0F172A;margin-bottom:8px;">{{.Title}}</div>
    <div style="font-size:13px;color:#475569;line-height:1.6;margin-bottom:12px;">{{.Body}}</div>
    <pre style="font-size:11px;color:#1e293b;background:#f1f5f9;padding:16px;border-radius:8px;max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;">{{.DataJSON}}</pre>
  </div>
  <div style="font-size:11px;color:#94A3B8;margin-top:12px;">{{.Footer}}</div>
</div>
