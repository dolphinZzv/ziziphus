<div style="max-width:400px;margin:0 auto;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="font-size:14px;font-weight:600;color:#0F172A;margin-bottom:20px;">{{.AppName}}</div>
  <div style="padding:24px 0;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;">
    <div style="font-size:13px;color:#475569;margin-bottom:12px;">Bestätigungscode</div>
    <div style="font-size:28px;font-weight:700;letter-spacing:4px;color:#0F172A;font-family:monospace;">{{.Code}}</div>
    <div style="font-size:12px;color:#94A3B8;margin-top:8px;">Gültig für 10 Minuten</div>
  </div>
  <div style="font-size:11px;color:#94A3B8;margin-top:12px;">Wenn Sie diesen Code nicht angefordert haben, ignorieren Sie bitte diese E-Mail.</div>
</div>
