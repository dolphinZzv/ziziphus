basePath: /api/v1
definitions:
  api.APIResponse:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
  api.PaginatedData:
    properties:
      items: {}
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  api.addContactReq:
    properties:
      nickname:
        type: string
      user_id:
        type: string
    type: object
  api.addMembersReq:
    properties:
      user_ids:
        items:
          type: string
        type: array
    type: object
  api.announcementResp:
    properties:
      body:
        type: string
      enabled:
        type: boolean
      title:
        type: string
      url:
        type: string
    type: object
  api.batchReq:
    properties:
      user_ids:
        items:
          type: string
        type: array
    type: object
  api.cloneGroupReq:
    properties:
      name:
        type: string
    type: object
  api.confirmEmailReq:
    properties:
      code:
        type: string
    type: object
  api.createAgentReq:
    properties:
      allow_direct_chat:
        type: boolean
      avatar:
        type: string
      cover:
        type: string
      discoverable:
        type: boolean
      headline:
        type: string
      name:
        type: string
      primary_color:
        type: string
      secondary_color:
        type: string
      wake_mode:
        type: integer
    type: object
  api.createGroupReq:
    properties:
      headline:
        type: string
      member_ids:
        items:
          type: string
        type: array
      name:
        type: string
    type: object
  api.createP2PReq:
    properties:
      user_id:
        type: string
    type: object
  api.healthResp:
    properties:
      components:
        additionalProperties:
          type: string
        type: object
      git_commit:
        type: string
      startup_time:
        type: string
      status:
        type: string
    type: object
  api.loginReq:
    properties:
      account:
        example: zhangsan
        type: string
      password:
        example: password123
        type: string
    type: object
  api.markReadReq:
    properties:
      msg_id:
        type: integer
    type: object
  api.mfaLoginReq:
    properties:
      code:
        type: string
      mfa_token:
        type: string
      user_id:
        type: string
    type: object
  api.mfaSetupReq:
    properties:
      email:
        type: string
      mfa_type:
        description: 1=totp, 2=email
        type: integer
    type: object
  api.mfaVerifyReq:
    properties:
      code:
        type: string
    type: object
  api.refreshReq:
    properties:
      refresh_token:
        type: string
    type: object
  api.registerReq:
    properties:
      account:
        example: zhangsan
        type: string
      email:
        example: user@example.com
        type: string
      name:
        example: 张三
        type: string
      password:
        example: password123
        type: string
    type: object
  api.requestContactReq:
    properties:
      message:
        type: string
      user_id:
        type: string
    type: object
  api.sendEmailCodeReq:
    properties:
      email:
        type: string
    type: object
  api.updateContactNicknameReq:
    properties:
      nickname:
        type: string
    type: object
  api.updateGroupReq:
    properties:
      avatar:
        type: string
      cover:
        type: string
      name:
        type: string
      notice:
        type: string
    type: object
  api.updateMeReq:
    properties:
      allow_direct_chat:
        type: boolean
      avatar:
        type: string
      cover:
        type: string
      discoverable:
        type: boolean
      email:
        type: string
      headline:
        type: string
      name:
        type: string
      primary_color:
        type: string
      secondary_color:
        type: string
    type: object
  file.FolderInfo:
    properties:
      mod_time:
        type: integer
      name:
        type: string
      path:
        type: string
    type: object
  model.User:
    properties:
      account:
        type: string
      allow_direct_chat:
        type: boolean
      api_key:
        type: string
      avatar:
        type: string
      cover:
        type: string
      created_at:
        type: integer
      discoverable:
        type: boolean
      email:
        type: string
      ext_meta:
        additionalProperties: {}
        type: object
      headline:
        type: string
      name:
        type: string
      primary_color:
        type: string
      secondary_color:
        type: string
      status:
        $ref: '#/definitions/model.UserStatus'
      type:
        $ref: '#/definitions/model.UserType'
      uid:
        type: string
      user_id:
        type: string
      wake_mode:
        $ref: '#/definitions/model.WakeMode'
    type: object
  model.UserStatus:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-varnames:
    - UserOffline
    - UserOnline
    - UserBusy
  model.UserType:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - UserHuman
    - UserAgent
  model.WakeMode:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - WakeModeAll
    - WakeModeMention
host: localhost:8080
info:
  contact: {}
  description: Ziziphus IM 服务 REST API 文档
  title: Ziziphus API
  version: "1.0"
paths:
  /announcement:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.announcementResp'
              type: object
      summary: Get global announcement
      tags:
      - system
  /auth/mfa/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: MFA verification request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.mfaLoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.APIResponse'
            - properties:
                data:
                  properties:
                    account:
                      type: string
                    expires_at:
                      type: string
                    name:
                      type: string
                    refresh_token:
                      type: string
                    token:
                      type: string
                    user_id:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.APIResponse'
      summary: Verify MFA code during login
      tags:
      - auth
  /contact-requests:
    post:
      consumes:
      - application/json
      description: Send a friend request to a user
      parameters:
      - description: Contact request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.requestContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Request contact
      tags:
      - contacts
  /contact-requests/by-form/{msg_id}:
    get:
      consumes:
      - application/json
      description: Get a contact request by its form message ID
      parameters:
      - description: Form message ID
        format: int64
        in: path
        name: msg_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Get contact request by form message ID
      tags:
      - contacts
  /contact-requests/received:
    get:
      consumes:
      - application/json
      description: List contact requests received by the current user
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      - description: Request status filter (-1 for all)
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: List received contact requests
      tags:
      - contacts
  /contact-requests/sent:
    get:
      consumes:
      - application/json
      description: List contact requests sent by the current user
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: List sent contact requests
      tags:
      - contacts
  /contacts:
    get:
      consumes:
      - application/json
      description: List contacts with pagination and online status
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: List contacts
      tags:
      - contacts
    post:
      consumes:
      - application/json
      description: Add a user to contacts list
      parameters:
      - description: Add contact request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.addContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Add a contact
      tags:
      - contacts
  /contacts/{user_id}:
    delete:
      consumes:
      - application/json
      description: Remove a contact by user ID, performs bidirectional deletion and
        removes the P2P conversation
      parameters:
      - description: Contact user ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Remove a contact
      tags:
      - contacts
    put:
      consumes:
      - application/json
      description: Update the nickname for a contact
      parameters:
      - description: Contact user ID
        in: path
        name: user_id
        required: true
        type: string
      - description: Nickname update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.updateContactNicknameReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Update contact nickname
      tags:
      - contacts
  /conversations:
    get:
      consumes:
      - application/json
      description: Get paginated list of conversations for the current user
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: List conversations
      tags:
      - conversations
  /conversations/{conv_id}:
    get:
      consumes:
      - application/json
      description: Get detailed information about a conversation including members
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Get conversation detail
      tags:
      - conversations
    put:
      consumes:
      - application/json
      description: Update group name, avatar, notice, or cover. Name/avatar require
        admin+, notice requires owner, cover supports any member.
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: Update group request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.updateGroupReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Update group conversation
      tags:
      - conversations
  /conversations/{conv_id}/clone:
    post:
      consumes:
      - application/json
      description: Clone a group conversation with all members and settings (owner
        only)
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: Clone group request
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.cloneGroupReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Clone a group conversation
      tags:
      - conversations
  /conversations/{conv_id}/disband:
    post:
      consumes:
      - application/json
      description: Disband a group conversation (owner only)
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Disband a group conversation
      tags:
      - conversations
  /conversations/{conv_id}/files:
    get:
      consumes:
      - application/json
      description: Get paginated list of files in a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Page size
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: List conversation files
      tags:
      - files
  /conversations/{conv_id}/files/{file_id}:
    delete:
      consumes:
      - application/json
      description: Delete a file from a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: File ID
        in: path
        name: file_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Delete a conversation file
      tags:
      - files
  /conversations/{conv_id}/files/{file_id}/move:
    put:
      consumes:
      - application/json
      description: Move a file to a different folder within a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: File ID
        in: path
        name: file_id
        required: true
        type: string
      - description: Move file request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Move a file
      tags:
      - files
  /conversations/{conv_id}/folders:
    delete:
      consumes:
      - application/json
      description: Delete a folder from a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: Folder path to delete
        in: query
        name: path
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Delete a folder
      tags:
      - files
    get:
      consumes:
      - application/json
      description: List folders in a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: Parent folder path (empty for root)
        in: query
        name: parent_path
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/file.FolderInfo'
            type: array
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: List folders
      tags:
      - files
    post:
      consumes:
      - application/json
      description: Create a new folder in a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: Create folder request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: Create a folder
      tags:
      - files
  /conversations/{conv_id}/folders/files:
    get:
      consumes:
      - application/json
      description: Get paginated list of files in a specific folder within a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: Folder path (empty for root)
        in: query
        name: path
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Page size
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - Bearer: []
      summary: List files in a folder
      tags:
      - files
  /conversations/{conv_id}/folders/move:
    put:
      consumes:
      - application/json
      description: Move a folder to a different parent folder within a conversation
      parameters:
      - description: Conversation ID
        in: path
        name: conv_id
        required: true
        type: string
      - description: Move folder request
        in: body
