name: E2E Tests + Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOCOVERDIR: /tmp/gocover

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: imdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/web/package-lock.json

      # ── Backend ──
      - name: Build backend with coverage
        working-directory: server
        run: |
          mkdir -p ${{ env.GOCOVERDIR }}
          go build -cover -o /tmp/panda_ai ./cmd/panda_ai/

      - name: Create server config for CI
        working-directory: server
        run: |
          cat > config/config.yaml << 'EOF'
          server:
            port: 8080
          postgres:
            dsn: "postgres://postgres:postgres@localhost:5432/imdb?sslmode=disable"
            max_conns: 20
            migrations: "internal/storage/db/migrations"
          redis:
            addr: "localhost:6379"
            password: ""
            db: 0
          jwt:
            secret: "ci-test-jwt-secret"
            expire_hours: 168
          snowflake:
            worker_id: 1
            start_time: "2025-01-01T00:00:00Z"
          ratelimit:
            msg_per_sec: 30
            max_body_bytes: 10240
            burst_size: 50
          storage:
            local_path: "data/files"
            base_url: "/files"
          smtp:
            host: ""
            port: "587"
            user: ""
            password: ""
            from: ""
          EOF

      - name: Start backend with coverage
        working-directory: server
        env:
          GOCOVERDIR: /tmp/gocover
        run: |
          /tmp/panda_ai -c config/config.yaml &
          for i in $(seq 1 10); do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server OK"
              break
            fi
            sleep 1
          done

      # ── Frontend ──
      - name: Install JS dependencies
        working-directory: server/web
        run: npm ci

      - name: Install Playwright
        working-directory: server/web
        run: npx playwright install chromium

      - name: Start Vite
        working-directory: server/web
        run: |
          npx vite --port 5173 --host &
          for i in $(seq 1 10); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Vite OK"
              break
            fi
            sleep 1
          done

      # ── E2E Tests ──
      - name: Run Playwright tests with JS coverage
        working-directory: server/web
        run: npx playwright test --reporter=list
        continue-on-error: true
        env:
          NODE_OPTIONS: "--no-warnings"

      # ── Stop server for coverage ──
      - name: Stop backend and collect coverage
        run: |
          # Kill the server to flush coverage data
          pkill -f panda_ai || true
          sleep 2

      # ── Coverage: Backend (Go) ──
      - name: Generate backend coverage from E2E
        env:
          GOCOVERDIR: /tmp/gocover
        run: |
          if ls $GOCOVERDIR/*.cov 2>/dev/null; then
            go tool covdata textfmt -i=$GOCOVERDIR -o=backend-e2e.out
            echo "=== Backend E2E Coverage ==="
            go tool cover -func=backend-e2e.out 2>&1 | grep "total:"
          else
            echo "No backend E2E coverage (Go 1.23+ or GOCOVERDIR required)"
            # Fallback: run unit tests
          fi

      - name: Run Go unit tests with coverage
        working-directory: server
        run: |
          go test -coverprofile=/tmp/unit.out ./... -count=1 2>&1 | tail -5
          echo "=== Backend Unit Coverage ==="
          go tool cover -func=/tmp/unit.out 2>&1 | grep "total:"

      # ── Coverage: Frontend (JS) ──
      - name: Generate frontend coverage report
        working-directory: server/web
        run: |
          node -e "
          import { readFileSync, readdirSync, writeFileSync } from 'fs';
          import { resolve } from 'path';
          const dir = '${{ github.workspace }}/coverage/frontend';
          let totalR = 0, coveredR = 0, srcFiles = new Set();
          let fCount = 0;
          try {
            const files = readdirSync(dir).filter(f => f.endsWith('.json'));
            fCount = files.length;
            files.forEach(f => {
              JSON.parse(readFileSync(resolve(dir, f), 'utf-8')).forEach(e => {
                const url = e.url || '';
                if (url.includes('/node_modules/') || url.includes('.vite/deps/')) return;
                if (!url.includes('/src/') && !url.includes('/assets/')) return;
                srcFiles.add(url);
                if (e.functions) e.functions.forEach(fn => { totalR += fn.total||0; coveredR += fn.ranges||0; });
              });
            });
          } catch(e) { console.log('Coverage dir not found:', e.message); }
          const cov = totalR > 0 ? Math.round((coveredR/totalR)*100) : 0;
          console.log('Coverage files: ' + fCount);
          console.log('Source files hit: ' + srcFiles.size);
          console.log('Frontend source coverage: ' + cov + '%');
          const outFile = '${{ github.workspace }}/coverage/e2e-report.json';
          writeFileSync(outFile, JSON.stringify({ frontend_coverage: cov, backend_unit_coverage: 'see above' }, null, 2));
          "

      # ── Upload Artifacts ──
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            server/web/test-results/
            ${{ github.workspace }}/coverage/
            backend-e2e.out
            /tmp/unit.out
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: server/web/playwright-report/
          retention-days: 7
