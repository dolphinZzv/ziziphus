name: E2E

on:
  schedule:
    - cron: "0 18 * * *"  # 02:00 CST (18:00 UTC), nightly
  workflow_dispatch:

jobs:
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: imdb
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: server/go.sum

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/web/package-lock.json

      - name: Install Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: npm ci
        working-directory: server/web

      - name: Setup config (E2E — rate limiting disabled)
        run: |
          cp config/config.example.yaml config/config.yaml
          sed -i 's/api_enabled: true/api_enabled: false/' config/config.yaml

      - name: Generate swagger docs
        run: |
          go install github.com/swaggo/swag/v2/cmd/swag@latest
          swag init -g cmd/ziziphus/main.go -o docs/

      - name: Build frontend
        run: npm run build
        working-directory: server/web

      - name: Build backend (with coverage)
        run: go build -cover -o ./bin/ziziphus ./cmd/ziziphus/

      - name: Start backend
        run: |
          COVER_DIR="${GITHUB_WORKSPACE}/coverage/backend"
          mkdir -p "$COVER_DIR"
          echo "GOCOVERDIR=$COVER_DIR" >> "$GITHUB_ENV"
          GOCOVERDIR="$COVER_DIR" ./bin/ziziphus -c config/config.yaml &
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            echo "Waiting for backend... ($i)"
            sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: server/web

      - name: Run E2E tests
        run: npx playwright test
        working-directory: server/web

      - name: Stop backend
        if: always()
        run: pkill -f "bin/ziziphus" || true

      - name: Merge coverage data
        if: always()
        run: |
          mkdir -p coverage
          go tool covdata textfmt -i="$GOCOVERDIR" -o=coverage/coverage.out

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: server/coverage/coverage.out,server/coverage/frontend/lcov.info
          flags: e2e
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: server/web/test-results/
          retention-days: 3
