name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ------------------------------------------------------------------
  # Go backend: lint, test, build (requires frontend dist for embed)
  # ------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build frontend (for embedded dist)
        working-directory: server/web
        run: |
          npm ci
          npm run build

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -count=1 -cover ./...

      - name: Go build
        run: go build -o /dev/null ./cmd/panda_ai/

  # ------------------------------------------------------------------
  # Frontend: lint, type-check, build
  # ------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
